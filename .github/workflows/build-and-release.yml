name: Build and Release

# 需要 contents: write 权限才能创建 GitHub Release
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'  # 推送 tag 时触发（如 v1.0.2）

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Extract version
      id: meta
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "CHANGELOG=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Restore dependencies
      run: dotnet restore QuotixDesktop.csproj

    - name: Build and Publish
      run: |
        dotnet publish QuotixDesktop.csproj -c Release -r win-x64 --self-contained true -p:Version=${{ steps.meta.outputs.VERSION }} -o publish
      shell: pwsh

    - name: Prepare Staging
      run: |
        $stagingDir = "Installer/Staging/Launcher"
        if (Test-Path $stagingDir) { Remove-Item $stagingDir -Recurse -Force }
        New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
        # 复制 publish 输出，过滤 .pdb 和 .xml 调试文件
        Get-ChildItem publish -Recurse -File | Where-Object {
          $_.Extension -ne ".pdb" -and $_.Extension -ne ".xml"
        } | ForEach-Object {
          $relativePath = $_.FullName.Substring((Resolve-Path "publish").Path.Length).TrimStart('\', '/')
          $destPath = Join-Path $stagingDir $relativePath
          $destDir = Split-Path $destPath -Parent
          if (-not (Test-Path $destDir)) { New-Item -ItemType Directory -Force -Path $destDir | Out-Null }
          Copy-Item $_.FullName -Destination $destPath -Force
        }
        Write-Host "Staging prepared"
      shell: pwsh

    - name: Install Inno Setup
      run: |
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (Test-Path $iscc) {
          Write-Host "Inno Setup already installed"
          exit 0
        }
        $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe"
        $out = "innosetup.exe"
        Invoke-WebRequest -Uri $url -OutFile $out
        Start-Process -FilePath $out -Args "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
      shell: pwsh

    - name: Ensure Chinese language file
      run: |
        $langFile = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
        if (-not (Test-Path $langFile)) {
          $langFile64 = "C:\Program Files\Inno Setup 6\Languages\ChineseSimplified.isl"
          if (-not (Test-Path $langFile64)) {
            Write-Host "ChineseSimplified.isl not found, downloading..."
            $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl"
            $dir = Split-Path $langFile -Parent
            if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Force -Path $dir | Out-Null }
            Invoke-WebRequest -Uri $url -OutFile $langFile
            Write-Host "Downloaded ChineseSimplified.isl"
          }
        } else {
          Write-Host "ChineseSimplified.isl already exists"
        }
      shell: pwsh

    - name: Build Installer
      run: |
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
          $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
        }
        & "$iscc" /DMyAppVersion=${{ steps.meta.outputs.VERSION }} Installer/QuotixInstaller.iss
      shell: pwsh

    - name: Sign installer (if cert configured)
      # 仅当仓库配置了 CODE_SIGN_CERT 密钥时才签名；否则跳过，不影响现有发布流程。
      if: ${{ secrets.CODE_SIGN_CERT != '' }}
      shell: pwsh
      env:
        CERT_B64: ${{ secrets.CODE_SIGN_CERT }}
        CERT_PW: ${{ secrets.CODE_SIGN_PASSWORD }}
      run: |
        $pfxPath = "Installer/Out/sign.pfx"
        [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:CERT_B64))
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $signtool) { throw "signtool.exe not found on runner" }
        $exe = Get-Item "Installer/Out/Quotix_Setup_*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfxPath /p $env:CERT_PW $exe.FullName
        if ($LASTEXITCODE -ne 0) { throw "Signing failed" }
        Remove-Item $pfxPath -Force
        Write-Host "Installer signed: $($exe.FullName)"

    - name: Prepare latest.yml
      run: |
        # 使用 Cloud-Build.ps1 提交的 latest.yml，复制到 Installer/Out/
        $outDir = "Installer/Out"
        if (-not (Test-Path $outDir)) { New-Item -ItemType Directory -Force -Path $outDir | Out-Null }
        if (Test-Path "latest.yml") {
          Copy-Item "latest.yml" "$outDir/latest.yml" -Force
          Write-Host "latest.yml copied from repo root:"
          Get-Content "$outDir/latest.yml"
        } else {
          Write-Host "Warning: latest.yml not found in repo root, generating version-only fallback..."
          $version = "${{ steps.meta.outputs.VERSION }}"
          $ymlContent = "version: $version`n"
          $ymlContent += "changelog: |`n"
          $ymlContent += "  $version`n"
          Set-Content -Path "$outDir/latest.yml" -Value $ymlContent -Encoding UTF8 -NoNewline
          Write-Host "latest.yml generated from version fallback:"
          Get-Content "$outDir/latest.yml"
        }
      shell: pwsh

    - name: Generate Release Notes
      run: |
        # Release Notes 只从 latest.yml 读取；不再从 commit body 提取发布日志。
        $latestYmlPath = "Installer/Out/latest.yml"
        $version = "${{ steps.meta.outputs.VERSION }}"
        $changelog = ""

        if (Test-Path $latestYmlPath) {
          $lines = Get-Content $latestYmlPath -Encoding UTF8
          $inChangelog = $false
          $items = New-Object System.Collections.Generic.List[string]

          foreach ($line in $lines) {
            $trimmedStart = $line.TrimStart()
            if (-not $inChangelog -and $trimmedStart.StartsWith("changelog:")) {
              $inChangelog = $true
              $afterColon = $trimmedStart.Substring($trimmedStart.IndexOf(":") + 1).Trim()
              if ($afterColon -and $afterColon -notin @("|", "|-", "|+")) {
                $items.Add($afterColon)
              }
              continue
            }

            if ($inChangelog) {
              if ($line.Trim() -eq "") {
                $items.Add("")
              } else {
                $items.Add($line.TrimStart())
              }
            }
          }

          $changelog = ($items -join "`n").Trim()
        }

        $notes = ""
        if ($changelog) {
          foreach ($line in ($changelog -split "`n")) {
            $trimmed = $line.TrimStart()
            if ($trimmed.StartsWith("##")) {
              $notes += "### " + $trimmed.Substring(2).Trim() + "`n"
            } else {
              $notes += $line + "`n"
            }
          }
        }
        if (-not $notes) { $notes = $version }
        Set-Content -Path "release_notes.md" -Value $notes -Encoding UTF8
        Write-Host "Release notes generated:"
        Get-Content "release_notes.md"
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          Installer/Out/Quotix_Setup_*.exe
          Installer/Out/latest.yml
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
